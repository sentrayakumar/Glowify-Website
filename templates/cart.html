{% load static %}
<!DOCTYPE html>
<html>
<head><title>Your Cart - Glowify</title></head>
<body style="font-family: sans-serif; padding: 50px;">
    <h2> (Shopping Cart)</h2>
    <table border="1" cellpadding="10" style="width: 100%; border-collapse: collapse;">
        <tr>
            <th>Products</th>
            <th>Quanity</th>
            <th>Price</th>
        </tr>
        {% for item in cart_items %}
        <tr>
            <td>{{ item.product.name }}</td>
            <td>{{ item.quantity }}</td>
            <td>₹{{ item.total_price }}</td>
        </tr>
        {% endfor %}
    </table>
    <h3>Total: ₹{{ total }}</h3>
    <a href="{% url 'shop' %}" style="background: #ff1e82; color: white; padding: 10px; text-decoration: none;">Continue Shopping</a>
</body>
</html>
