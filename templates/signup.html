{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Glowify - Sign Up</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #fdf2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .signup-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        .signup-card h2 { color: #d63384; margin-bottom: 20px; }
        form p { text-align: left; font-size: 13px; color: #666; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { background: #d63384; color: white; border: none; padding: 12px; width: 100%; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="signup-card">
        <h2>Glowify</h2>
        <p>புதிய கணக்கை உருவாக்கவும்</p>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Register Now</button>
        </form>
    </div>
</body>
</html>
